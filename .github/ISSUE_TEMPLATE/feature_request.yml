name: Feature request
description: Suggest a product, routing, or operator-facing improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator, client, or provider problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change and any expected API, config, or UX impact.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any simpler or current workarounds you already tried.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - routing
        - providers
        - observability
        - docker / distribution
        - security
        - docs
        - integrations
    validations:
      required: true
