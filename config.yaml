# FoundryGate – Routing Configuration
# Layered routing: static → heuristic → llm-classify
#
# Provider reference: https://docs.openclaw.ai/concepts/model-providers
# Every provider supported by the current OpenClaw version is listed below.
# Uncomment + set the required env var to activate any provider.
#
# API-key env vars → see .env.example

server:
  host: "127.0.0.1"
  port: 8090
  log_level: "info"

# ── Provider Definitions ───────────────────────────────────────────────────
#
# Fields:
#   contract     : generic | local-worker
#   backend      : openai-compat | google-genai | anthropic-compat
#   base_url     : API endpoint (supports ${VAR:-default} expansion)
#   api_key      : ${ENV_VAR} – leave blank to skip provider at startup
#   model        : upstream model id
#   max_tokens   : default max output tokens
#   context_window: optional total context budget used for route-fit checks
#   tier         : default | reasoning | cheap | mid | fallback | local
#   limits       : optional token limits used for route-fit checks
#     max_input_tokens : maximum estimated input tokens
#     max_output_tokens: maximum requested output tokens
#   cache        : optional cache metadata used for route ranking
#     mode       : none | implicit | explicit
#     read_discount: whether cache reads are cheaper than fresh input
#   capabilities : optional provider metadata for future policy-aware routing
#     chat            : must stay true in the current runtime
#     reasoning       : provider is suitable for deeper reasoning tasks
#     vision          : multimodal vision is supported end-to-end
#     tools           : tool definitions are forwarded end-to-end
#     long_context    : tuned for large context windows
#     streaming       : streaming is supported end-to-end
#     local / cloud   : explicit network placement metadata
#     cost_tier       : free-form label such as budget | standard | premium
#     latency_tier    : free-form label such as low | standard | high
#     network_zone    : free-form zone label, defaults to local/public
#     compliance_scope: free-form label for policy and governance
#   timeout      : per-provider timeouts in seconds (optional)
#     connect_s  : connection timeout  (default: 10)
#     read_s     : read/response timeout (default: 120)
#   pricing      : USD per 1 000 000 tokens (input / output / cache_read)
#                  Used for cost tracking only – not enforced.
#   image        : optional image-routing metadata for `contract: image-provider`
#     max_outputs    : maximum supported `n`
#     max_side_px    : largest supported edge size
#     supported_sizes: optional exact allowed size strings such as 1024x1024
#     policy_tags    : optional routing tags such as quality | cost | balanced
#
# Sections
# ─────────
# A. DEFAULT ENABLED PROVIDERS – enabled in the stock config
# B. BUILT-IN (pi-ai)       – one entry per OpenClaw built-in provider;
#                             commented out if no key is set
# C. CUSTOM / PROXY         – providers via models.providers in OpenClaw
# D. LOCAL RUNTIMES         – Ollama, vLLM, LM Studio, LiteLLM
#
# local-worker contract
# ─────────────────────
# Use `contract: local-worker` for network-local OpenAI-compatible workers.
# The current runtime validates:
#   - backend must be openai-compat
#   - base_url must point to localhost or private network space
#   - tier defaults to local
#   - capabilities are forced to local=true, cloud=false, network_zone=local
#
# client_profiles
# ───────────────
# Optional caller-aware defaults. Profiles are resolved from request headers and
# applied as default provider preferences only when policy/static/heuristic
# routing did not already make a stronger decision.
#
# request_hooks
# ─────────────
# Optional pre-routing extension seam. Hooks may add per-request routing hints
# or profile overrides before the normal route selection continues.

providers:

  # ────────────────────────────────────────────────────────────────────────
  # A. DEFAULT ENABLED PROVIDERS (enabled by default)
  # ────────────────────────────────────────────────────────────────────────

  deepseek-chat:
    backend: openai-compat
    base_url: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-chat"
    max_tokens: 8000
    tier: default          # Everyday default model
    timeout:
      connect_s: 10
      read_s: 60
    pricing:               # USD pro 1M Tokens
      input: 0.27
      output: 1.10
      cache_read: 0.07

  deepseek-reasoner:
    backend: openai-compat
    base_url: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}"
    api_key: "${DEEPSEEK_API_KEY}"
    model: "deepseek-reasoner"
    max_tokens: 8000
    tier: reasoning        # Complex reasoning tasks
    timeout:
      connect_s: 10
      read_s: 120
    pricing:
      input: 0.55
      output: 2.19
      cache_read: 0.14

  gemini-flash-lite:
    backend: google-genai
    base_url: "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}"
    api_key: "${GEMINI_API_KEY}"
    model: "gemini-2.5-flash-lite"
    max_tokens: 8000
    tier: cheap            # Heartbeats and simple checks
    timeout:
      connect_s: 10
      read_s: 30
    pricing:
      input: 0.075
      output: 0.30
      cache_read: 0.02

  gemini-flash:
    backend: google-genai
    base_url: "${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}"
    api_key: "${GEMINI_API_KEY}"
    model: "gemini-2.5-flash"
    max_tokens: 8000
    tier: mid              # Vision and medium-complexity tasks
    timeout:
      connect_s: 10
      read_s: 60
    pricing:
      input: 0.15
      output: 0.60
      cache_read: 0.04

  openrouter-fallback:
    backend: openai-compat
    base_url: "${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
    api_key: "${OPENROUTER_API_KEY}"
    model: "deepseek/deepseek-chat"
    max_tokens: 8000
    tier: fallback
    timeout:
      connect_s: 10
      read_s: 90
    pricing:
      input: 0.27
      output: 1.10
      cache_read: 0.07

