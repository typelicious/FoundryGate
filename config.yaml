# ── Fallback-Kette ─────────────────────────────────────────────────────────
# Order: first healthy provider in this list is tried after the routing
# decision fails. Keep at least one guaranteed-available provider here.
fallback_chain:
  - deepseek-chat
  - deepseek-reasoner
  - gemini-flash
  - openrouter-fallback


# ── Layer 0: Policy-Auswahl (optional) ────────────────────────────────────
# Diese Schicht läuft vor den statischen und heuristischen Regeln.
# Gedacht für client-, governance- oder netzwerkbezogene Auswahl, ohne
# bestehende explizite Provider-Pins im API-Layer zu brechen.
#
# select:
#   allow_providers      : nur diese Provider dürfen gewählt werden
#   deny_providers       : diese Provider werden ausgeschlossen
#   prefer_providers     : bevorzugte Reihenfolge innerhalb der Kandidaten
#   prefer_tiers         : bevorzugte tier-Werte innerhalb der Kandidaten
#   require_capabilities : boolesche Capability-Namen, die true sein müssen
#   capability_values    : exakte Capability-Werte, z. B. local=true
routing_policies:
  enabled: false
  rules:
    # Beispiel: lokalen Worker für interne/local-only Requests bevorzugen
    # - name: prefer-local-worker
    #   match:
    #     header_contains:
    #       x-foundrygate-profile: ["local-only", "private"]
    #   select:
    #     capability_values:
    #       local: true
    #     prefer_tiers: ["local"]


# ── Client Profiles (optional) ────────────────────────────────────────────
# Detects callers from headers and applies default routing hints when no
# policy/static/heuristic rule has already selected a provider.
#
# match:
#   header_present  : all listed headers must exist
#   header_contains : any listed substring match activates the profile rule
#
# profile hints use the same selector keys as routing_policies.select.
client_profiles:
  enabled: false
  default: generic
  presets: []   # Built-ins: ["openclaw", "n8n", "cli"]
  profiles:
    generic: {}
    openclaw:
      prefer_tiers: ["default", "reasoning"]
    n8n:
      prefer_tiers: ["cheap", "default"]
    local-only:
      capability_values:
        local: true
  rules:
    # - profile: openclaw
    #   match:
    #     header_present: ["x-openclaw-source"]
    # - profile: n8n
    #   match:
    #     header_contains:
    #       x-foundrygate-client: ["n8n"]
    # - profile: local-only
    #   match:
    #     header_contains:
    #       x-foundrygate-profile: ["local-only", "private"]


# ── Request Hooks (optional) ──────────────────────────────────────────────
# Built-in hooks:
#   prefer-provider-header  -> x-foundrygate-prefer-provider
#   locality-header         -> x-foundrygate-locality: local-only | cloud-only
#   profile-override-header -> x-foundrygate-profile
#
# Hook hints run after policy/static/heuristic rules and before client-profile
# defaults. Keep them opt-in and request-scoped.
# on_error:
#   continue -> record hook errors and continue routing
#   fail     -> reject the request when a hook fails
request_hooks:
  enabled: false
  on_error: continue
  hooks: []
  # hooks:
  #   - prefer-provider-header
  #   - locality-header
  #   - profile-override-header


# ── Layer 1: Statische Regeln ──────────────────────────────────────────────
# Schnellste Schicht – Pattern-Matching auf bekannte Muster
static_rules:
  enabled: true
  rules:
    # OpenClaw Heartbeat-Checks
    - name: heartbeat
      match:
        any:
          - system_prompt_contains: ["heartbeat", "health check", "status check", "are you there"]
          - model_requested: ["heartbeat", "cheap", "flash-lite"]
      route_to: gemini-flash-lite

    # Explizite Modell-Anfragen via model-Feld
    - name: explicit-reasoner
      match:
        model_requested: ["reasoner", "r1", "think", "deepseek-reasoner"]
      route_to: deepseek-reasoner

    - name: explicit-flash
      match:
        model_requested: ["flash", "gemini", "vision"]
      route_to: gemini-flash

    - name: explicit-chat
      match:
        model_requested: ["chat", "ds", "default", "deepseek-chat"]
      route_to: deepseek-chat

    # Subagent-Erkennung
    - name: subagent
      match:
        any:
          - system_prompt_contains: ["sub-agent", "subagent", "parallel task", "delegated task"]
          - header_contains:
              x-openclaw-source: ["subagent", "sub-agent"]
      route_to: deepseek-chat


# ── Layer 2: Heuristik-Klassifikation ─────────────────────────────────────
# Mittlere Schicht – regelbasierte Analyse des Request-Inhalts
heuristic_rules:
  enabled: true
  rules:
    # Mathematik / Logik → Reasoner (multilingual, ClawRouter-inspired)
    - name: math-reasoning
      match:
        message_keywords:
          any_of: ["prove", "beweis", "beweise", "theorem", "integral", "derivative",
                   "equation", "gleichung", "induction", "induktion",
                   "\\boxed", "\\frac", "\\sum", "\\int", "latex",
                   "step by step", "schritt für schritt",
                   "warum", "why does", "explain why", "erkläre warum",
                   "证明", "定理", "証明", "доказать"]
          min_matches: 2
      route_to: deepseek-reasoner

    # Code-Analyse / Debugging → Reasoner
    - name: complex-code
      match:
        message_keywords:
          any_of: ["refactor", "debug", "architecture", "design pattern",
                   "race condition", "memory leak", "optimize", "complexity",
                   "security vulnerability", "code review",
                   "performance bottleneck", "type error", "deadlock"]
          min_matches: 2
      route_to: deepseek-reasoner

    # Einfache Anfragen → Flash-Lite (günstigster Tier)
    - name: simple-query
      match:
        message_keywords:
          any_of: ["what is", "was ist", "define", "definiere",
                   "translate", "übersetze", "hi", "hello", "hallo",
                   "thanks", "danke", "yes", "ja", "no", "nein",
                   "что такое", "你好", "こんにちは"]
          min_matches: 1
      route_to: gemini-flash-lite

    # Tool-Calls vorhanden → Chat (non-thinking optimal für OpenClaw)
    - name: tool-use
      match:
        has_tools: true
      route_to: deepseek-chat

    # Kurze Nachrichten (< 100 tokens) → Chat
    - name: short-message
      match:
        estimated_tokens:
          less_than: 100
      route_to: deepseek-chat

    # Lange Kontext-Fenster (> 50k tokens) → Chat (billiger als Reasoner)
    - name: long-context
      match:
        estimated_tokens:
          greater_than: 50000
      route_to: deepseek-chat

    # Mittlere Komplexität ohne klare Signale → Chat
    - name: general-default
      match:
        fallthrough: true
      route_to: deepseek-chat


# ── Layer 3: LLM-Klassifikation (optional) ────────────────────────────────
# Langsamste Schicht – ein billiges Modell entscheidet
llm_classifier:
  enabled: false           # Auf true setzen wenn gewünscht
  classifier_provider: gemini-flash-lite
  max_classify_tokens: 50
  timeout_ms: 3000
  fallback_on_timeout: deepseek-chat
  prompt: |
    Classify this task into exactly one category. Reply with ONLY the category name.
    Categories:
    - REASONING: math proofs, logic puzzles, complex analysis, debugging
    - CODING: code generation, refactoring, architecture decisions
    - SIMPLE: greetings, status checks, short lookups, translations
    - AGENT: tool use, file operations, search, API calls

    User message: {last_user_message}

    Category:
  category_routing:
    REASONING: deepseek-reasoner
    CODING: deepseek-chat
    SIMPLE: gemini-flash-lite
    AGENT: deepseek-chat


# ── Health-Check-Einstellungen ─────────────────────────────────────────────
health:
  check_interval_seconds: 300
  timeout_seconds: 10
  consecutive_failures_before_skip: 3
  recovery_check_interval_seconds: 60


# ── Release Update Checks ───────────────────────────────────────────────────
update_check:
  enabled: true
  repository: "typelicious/FoundryGate"
  api_base: "https://api.github.com"
  timeout_seconds: 5
  check_interval_seconds: 21600

# ── Optional Auto-Update Enabler ────────────────────────────────────────────
# This does not make the API mutate the checkout. It only marks whether the
# current release status is eligible for a helper-driven update command.
auto_update:
  enabled: false
  allow_major: false
  require_healthy_providers: true
  max_unhealthy_providers: 0
  apply_command: "foundrygate-update"


# ── Prompt Caching ─────────────────────────────────────────────────────────
# DeepSeek: Automatisch server-seitig (prefix-basiert, 64-token Granularität)
#   - Cache Hit: $0.014/M tokens (10x billiger als Input $0.14/M)
#   - Prefix muss identisch sein (ab Token 0)
#   - Cache baut sich in Sekunden auf, best-effort
# Gemini: Implizites Caching für 2.5 Flash/Pro (min 1028 Tokens)
#   - Cached tokens: 0.25x des normalen Input-Preises
#   - TTL ~3-5 Minuten
# Anthropic: Explicit cache_control blocks; cache_creation + cache_read in usage
prompt_caching:
  track_metrics: true
  stabilize_prefix: false


# ── Logging & Metriken ─────────────────────────────────────────────────────
# DB path: resolved via FOUNDRYGATE_DB_PATH env var (recommended: /var/lib/foundrygate/foundrygate.db)
# Fallback: ~/.local/share/foundrygate/foundrygate.db
# NEVER set to ./foundrygate.db – repo safety guardrail rejects it.
metrics:
  enabled: true
  db_path: "${FOUNDRYGATE_DB_PATH:-/var/lib/foundrygate/foundrygate.db}"
  log_requests: true
  log_routing_decisions: true
